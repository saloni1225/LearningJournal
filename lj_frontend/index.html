<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Journal - Student</title>
  <link rel="stylesheet" href="CSS/index.css">
</head>
<body data-page="student">
  <!-- Navbar -->
  <nav class="navbar">
    <h1>Learning Journal</h1>
    <div class="nav-buttons">
      <button onclick="window.location.href='my_entries.html'">My Entries</button>
      <button onclick="logoutUser()">Logout (Student)</button>
    </div>
  </nav>

  <!-- Journal Form -->
  <div class="container" id="formContainer">
    <form id="journalForm">
      <h2>Weekly Journal Entry</h2>

      <div class="row">
        <div class="col">
          <label>Week Number *</label>
          <input type="number" id="week" required min="1">

          <label>Start Date *</label>
          <input type="date" id="startDate" required>

          <label>End Date *</label>
          <input type="date" id="endDate" required>

          <label>Course Code *</label>
          <input type="text" id="courseCode" required>

          <label>Course Name *</label>
          <input type="text" id="courseName" required>

          <label>Module *</label>
          <input type="text" id="module" required>
        </div>

        <div class="col">
          <label>Topics Covered *</label>
          <textarea id="topics" required></textarea>
          <small id="topicsCounter">0 / 80 words</small>

          <label>Key Terms Learnt *</label>
          <textarea id="keyTerms" required></textarea>
          <small id="keyTermsCounter">0 / 40 words</small>

          <label>Summary of Learning *</label>
          <textarea id="summary" required></textarea>
          <small id="summaryCounter">0 / 100 words</small>

          <label>Doubts / Clarifications Needed *</label>
          <textarea id="doubts" required></textarea>
          <small id="doubtsCounter">0 / 50 words</small>

          <label>How I Covered Missed Content *</label>
          <textarea id="makeup" required></textarea>
          <small id="makeupCounter">0 / 50 words</small>
        </div>
      </div>

      <h3>Student Info</h3>
      <div class="row">
        <div class="col">
          <label>USN *</label>
          <input type="text" id="usn" required>
          <div id="usnError" class="error"></div>
        </div>
        <div class="col">
          <label>Name *</label>
          <input type="text" id="studentName" required>
        </div>
        <div class="col">
          <label for="semester">Semester *</label>
          <select id="semester" required>
            <option value="">-- Select Semester --</option>
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
            <option value="3">Semester 3</option>
            <option value="4">Semester 4</option>
            <option value="5">Semester 5</option>
            <option value="6">Semester 6</option>
            <option value="7">Semester 7</option>
            <option value="8">Semester 8</option>
          </select>
        </div>
        <div class="col">
          <label for="classSection">Section *</label>
          <select id="classSection" required>
            <option value="">-- Select Section --</option>
            <option value="A">Section A</option>
            <option value="B">Section B</option>
            <option value="C">Section C</option>
          </select>
        </div>
      </div>

      <button type="submit">Save Entry</button>
    </form>
  </div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const token = getCookie("token");
  if (!token) {
    alert("Please login first.");
    window.location.href = "login.html";
    return;
  }

  const payload = parseJwt(token);
  if (payload.role !== "student") {
    alert("Access denied: Students only.");
    window.location.href = "login.html";
    return;
  }

  const editId = new URLSearchParams(window.location.search).get("editId");
  let editingEntryId = null;

  document.getElementById("studentName").value = payload.fullName || "";

  // USN validation
  const usnInput = document.getElementById("usn");
  const usnError = document.getElementById("usnError");
  usnInput.addEventListener("input", () => {
    const usn = usnInput.value.trim().toUpperCase();
    usnInput.value = usn;
    const pattern = /^[0-9][A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{3}$/;
    usnError.textContent = pattern.test(usn) ? "" : "USN must be in format 1CD11CS001 (10 chars).";
  });

  // Word count limits
  const limits = { topics: 80, keyTerms: 40, summary: 100, doubts: 50, makeup: 50 };
  Object.keys(limits).forEach(id => {
    const textarea = document.getElementById(id);
    const counter = document.getElementById(id + "Counter");
    textarea.addEventListener("input", () => {
      const words = textarea.value.trim().split(/\s+/).filter(Boolean);
      if (words.length > limits[id]) textarea.value = words.slice(0, limits[id]).join(" ");
      counter.textContent = `${words.length} / ${limits[id]} words`;
    });
  });

  if (editId) {
    try {
      const res = await fetch(`http://localhost:5000/api/journal/${editId}`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const entry = await res.json();
      if (!res.ok) throw new Error(entry.message || "Failed to load entry");

      editingEntryId = editId;
      document.querySelector("#journalForm h2").textContent = "Edit Journal Entry";
      document.querySelector("#journalForm button[type='submit']").textContent = "Update Entry";

      document.getElementById("week").value = entry.week || "";
      if (entry.weekRange && entry.weekRange.includes(" - ")) {
        const [start, end] = entry.weekRange.split(" - ");
        document.getElementById("startDate").value = start;
        document.getElementById("endDate").value = end;
      }
      document.getElementById("courseCode").value = entry.courseCode || "";
      document.getElementById("courseName").value = entry.courseName || "";
      document.getElementById("module").value = entry.module || "";
      document.getElementById("topics").value = entry.topics || "";
      document.getElementById("keyTerms").value = entry.keyTerms || "";
      document.getElementById("summary").value = entry.summary || "";
      document.getElementById("doubts").value = entry.doubts || "";
      document.getElementById("makeup").value = entry.makeup || "";
      document.getElementById("usn").value = entry.usn || "";
      document.getElementById("studentName").value = entry.studentName || payload.fullName || "";
      document.getElementById("semester").value = entry.semester || "";
      document.getElementById("classSection").value = entry.classSection || "";
    } catch (err) {
      alert("❌ " + err.message);
    }
  }

  document.getElementById("journalForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const entryData = {
      week: document.getElementById("week").value.trim(),
      weekRange: `${document.getElementById("startDate").value} - ${document.getElementById("endDate").value}`,
      courseCode: document.getElementById("courseCode").value.trim(),
      courseName: document.getElementById("courseName").value.trim(),
      module: document.getElementById("module").value.trim(),
      topics: document.getElementById("topics").value.trim(),
      keyTerms: document.getElementById("keyTerms").value.trim(),
      summary: document.getElementById("summary").value.trim(),
      doubts: document.getElementById("doubts").value.trim(),
      makeup: document.getElementById("makeup").value.trim(),
      usn: document.getElementById("usn").value.trim().toUpperCase(),
      studentName: document.getElementById("studentName").value.trim(),
      semester: document.getElementById("semester").value,
      classSection: document.getElementById("classSection").value,
    };

    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;
    if (!startDate || !endDate) { alert("Please select both start and end dates."); return; }
    if (new Date(startDate) > new Date(endDate)) { alert("End Date cannot be before Start Date."); return; }

    const url = editingEntryId
      ? `http://localhost:5000/api/journal/${editingEntryId}`
      : "http://localhost:5000/api/journal";
    const method = editingEntryId ? "PATCH" : "POST";

    try {
      const res = await fetch(url, {
        method,
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`,
        },
        body: JSON.stringify(entryData),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Failed to save entry");
      alert(editingEntryId ? "✅ Entry updated successfully!" : "✅ Entry saved successfully!");
      if (editingEntryId) {
        window.location.href = "my_entries.html";
      } else {
        document.getElementById("journalForm").reset();
        document.getElementById("studentName").value = payload.fullName || "";
      }
    } catch (err) {
      alert("❌ " + err.message);
    }
  });

  // Logout
  window.logoutUser = function() {
    document.cookie = "token=; path=/; max-age=0";
    window.location.href = "login.html";
  }

  // Helper to read JWT cookie
  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if(parts.length === 2) return parts.pop().split(';').shift();
  }

  // Decode JWT payload
  function parseJwt(token) {
    try {
      const base64Payload = token.split('.')[1];
      return JSON.parse(atob(base64Payload));
    } catch {
      return {};
    }
  }

});
</script>
</body>
</html>
