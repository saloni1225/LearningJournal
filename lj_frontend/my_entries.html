<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Entries | Learning Journal</title>
<link rel="stylesheet" href="CSS/myentry.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<nav class="navbar">
  <h1>📘 My Journal Entries</h1>
  <div class="nav-buttons">
    <button onclick="window.location.href='index.html'">New Entry</button>
    <button onclick="logoutUser()">Logout</button>
  </div>
</nav>

<div id="entriesContainer"></div>

<script>
const { jsPDF } = window.jspdf;

// === Authentication ===
// === Authentication ===
const token = getCookie("token"); // Read JWT from cookie
if(!token) {
  alert("Please login first.");
  window.location.href = "login.html";
}

// Helper to read JWT cookie
function getCookie(name) {
  const value = `; ${document.cookie}`;
  const parts = value.split(`; ${name}=`);
  if (parts.length === 2) return parts.pop().split(";").shift();
}


// Logout
function logoutUser() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

// Fetch student entries from backend
async function fetchStudentEntries() {
    try {
        const res = await fetch("http://localhost:5000/api/journal/mine", {
            headers: { "Authorization": `Bearer ${token}` }
        });
        if(!res.ok) throw new Error("Failed to fetch entries");
        return await res.json();
    } catch(err) {
        alert("❌ Could not load entries: " + err.message);
        return [];
    }
}

// Load entries into DOM
async function loadEntries() {
    const entries = await fetchStudentEntries();
    const container = document.getElementById("entriesContainer");
    container.innerHTML = "";

    if(entries.length === 0){
        container.innerHTML = "<p>No entries found.</p>";
        return;
    }

    entries.forEach(entry => {
        const div = document.createElement("div");
        div.className = "entry";

        div.innerHTML = `
            <h2>Week ${entry.week} (${entry.weekRange})</h2>
            <p><strong>Course:</strong> ${entry.courseCode} - ${entry.courseName}</p>
            <p><strong>Module:</strong> ${entry.module}</p>
            <p><strong>Topics Covered:</strong> ${entry.topics}</p>
            <p><strong>Key Terms:</strong> ${entry.keyTerms}</p>
            <p><strong>Summary:</strong> ${entry.summary}</p>
            <p><strong>Doubts / Clarifications Needed:</strong> ${entry.doubts}</p>
            <p><strong>Missed Content Covered:</strong> ${entry.makeup}</p>
            ${entry.remark ? `<p><strong>Admin Remark:</strong> ${entry.remark}</p>` : ""}
            <div class="buttons">
                <button onclick="editEntry('${entry._id}')">Edit</button>
                <button onclick="deleteEntry('${entry._id}')">Delete</button>
                <button onclick="downloadPDF('${entry._id}')">Download PDF</button>
            </div>
            <div class="timestamp">Last Edited On: ${entry.lastEdited || "Not available"}</div>
        `;
        container.appendChild(div);
    });
}

// Edit entry
function editEntry(id){
    window.location.href = `index.html?editId=${id}`;
}

// Delete entry
async function deleteEntry(id){
    if(!confirm("Are you sure you want to delete this entry?")) return;

    try {
        const res = await fetch(`http://localhost:5000/api/journal/${id}`, {
            method: "DELETE",
            headers: { "Authorization": `Bearer ${token}` }
        });
        if(!res.ok) throw new Error("Failed to delete entry");
        alert("🗑️ Entry deleted!");
        loadEntries();
    } catch(err){
        alert("❌ Could not delete entry: " + err.message);
    }
}

// Download PDF
async function downloadPDF(id){
    try {
        const res = await fetch(`http://localhost:5000/api/journal/${id}`, {
            headers: { "Authorization": `Bearer ${token}` }
        });
        if(!res.ok) throw new Error("Failed to fetch entry");
        const entry = await res.json();

        const doc = new jsPDF(); 
        let y=15;

        doc.setFont("helvetica","bold"); 
        doc.setFontSize(16); 
        doc.text("Learning Journal Entry",105,y,{align:"center"}); 
        y+=12;

        doc.setFontSize(12); 
        doc.setFont("helvetica","bold"); 
        doc.text("Student Info:",14,y); y+=7;
        doc.setFont("helvetica","normal");
        doc.text(`USN: ${entry.usn}`,14,y); y+=6;
        doc.text(`Name: ${entry.studentName}`,14,y); y+=6;
        doc.text(`Semester: ${entry.semester}`,14,y); y+=6;
        doc.text(`Section: ${entry.classSection}`,14,y); y+=10;

        doc.setFont("helvetica","bold"); doc.text("Entry Info:",14,y); y+=7; doc.setFont("helvetica","normal");
        doc.text(`Week Number: ${entry.week}`,14,y); y+=6;
        doc.text(`Week Range: ${entry.weekRange}`,14,y); y+=6;
        doc.text(`Course Code: ${entry.courseCode}`,14,y); y+=6;
        doc.text(`Course Name: ${entry.courseName}`,14,y); y+=6;
        doc.text(`Module: ${entry.module}`,14,y); y+=10;

        function addWrappedText(label,value){
            doc.setFont("helvetica","bold"); doc.text(`${label}:`,14,y); y+=6;
            doc.setFont("helvetica","normal");
            const lines = doc.splitTextToSize(value||"-",180); 
            doc.text(lines,14,y); 
            y+=lines.length*6+4;
        }

        addWrappedText("Topics Covered",entry.topics);
        addWrappedText("Key Terms Learnt",entry.keyTerms);
        addWrappedText("Summary of Learning",entry.summary);
        addWrappedText("Doubts / Clarifications Needed",entry.doubts);
        addWrappedText("How I Covered Missed Content",entry.makeup);
        if(entry.remark) addWrappedText("Admin Remark", entry.remark);

        doc.save(`Journal_${entry.usn}_Week${entry.week}.pdf`);

    } catch(err){
        alert("❌ Could not download PDF: " + err.message);
    }
}

// Initial load
window.addEventListener("DOMContentLoaded", loadEntries);
</script>
</body>
</html>
