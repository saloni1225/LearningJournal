<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Journal | Login</title>
  <link rel="stylesheet" href="CSS/login.css">
</head>
<body data-page="login"> 
  <!-- Heading -->
  <div class="heading">
    <div class="small">WELCOME TO THE</div>
    <div class="big">WEEKLY JOURNAL</div>
  </div>

  <!-- Role cards -->
  <div class="card-container" id="roleCards">
    <div class="card" onclick="showLogin('admin')">
      <img src="img/admin.jpg" alt="Admin">
      <h2>Admin</h2>
      <p>Access and manage journal entries</p>
    </div>
    <div class="card" onclick="showLogin('student')">
      <img src="img/student.png" alt="Student">
      <h2>Student</h2>
      <p>Fill your weekly journal and track your progress</p>
    </div>
  </div>

  <!-- Login Form -->
  <div class="form-container" id="loginForm">
    <h2 id="loginTitle">Login</h2>
    <input type="text" id="username" placeholder="Username" required>
    <div class="input-with-toggle">
      <input type="password" id="password" placeholder="Password" required>
      <button type="button" class="toggle-password" onclick="togglePassword('password', this)">Show</button>
    </div>
    <button onclick="handleLogin()">Login</button>
    <p>Don't have an account? <span onclick="showStudentSignup()">Signup here</span></p>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>

  <!-- Student Signup Form -->
  <div class="form-container" id="signupForm">
    <h2>Student Signup</h2>
    <input type="text" id="signupFullName" placeholder="Full Name" required>
    <input type="text" id="signupUsername" placeholder="Username" required>
    <div class="input-with-toggle">
      <input type="password" id="signupPassword" placeholder="Password" required>
      <button type="button" class="toggle-password" onclick="togglePassword('signupPassword', this)">Show</button>
    </div>
    <button onclick="handleSignup()">Signup</button>
    <button class="back-btn" onclick="goBackSignup()">← Back</button>
  </div>

  <script>
let selectedRole = ""; // Role for login
let signupRole = "student"; // Role for signup (default)

// Show login form
function showLogin(role) {
  selectedRole = role;
  document.getElementById("roleCards").style.display = "none";
  document.getElementById("loginForm").style.display = "flex";
  document.getElementById("loginTitle").innerText =
    role === "admin" ? "Admin Login" : "Student Login";

  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
}

// Go back from login to role cards
function goBack() {
  document.getElementById("roleCards").style.display = "flex";
  document.getElementById("loginForm").style.display = "none";
}

// Show signup form
function showStudentSignup() {
  signupRole = "student"; // default
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("signupForm").style.display = "flex";

  // Update heading based on current role
  document.querySelector("#signupForm h2").innerText =
    selectedRole === "admin" ? "Admin Signup" : "Student Signup";

  document.getElementById("signupFullName").value = "";
  document.getElementById("signupUsername").value = "";
  document.getElementById("signupPassword").value = "";
}

// Go back from signup to login
function goBackSignup() {
  document.getElementById("signupForm").style.display = "none";
  document.getElementById("loginForm").style.display = "flex";
  document.getElementById("loginTitle").innerText =
    selectedRole === "admin" ? "Admin Login" : "Student Login";
}

// Toggle show/hide password
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  if(input.type === "password") { input.type="text"; btn.innerText="Hide"; }
  else { input.type="password"; btn.innerText="Show"; }
}

// Handle Login
async function handleLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!username || !password){ alert("❌ Enter all fields"); return; }

  try {
    const res = await fetch("http://localhost:5000/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ role: selectedRole, username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || "Login failed");

    document.cookie = `token=${data.token}; path=/; max-age=3600`;

    if(selectedRole === "admin") window.location.href = "admin_entries.html";
    else window.location.href = "index.html";
  } catch (err) {
    alert("❌ " + err.message);
  }
}

// Handle Signup
async function handleSignup() {
  const fullName = document.getElementById("signupFullName").value.trim();
  const username = document.getElementById("signupUsername").value.trim();
  const password = document.getElementById("signupPassword").value.trim();

  if(!fullName || !username || !password){ alert("❌ All fields are required"); return; }

  try {
    const res = await fetch("http://localhost:5000/api/auth/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ role: signupRole, fullName, username, password }),
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.message || "Signup failed");

    alert("✅ " + data.message);

    // Show login after signup
    signupRole = "student";
    document.getElementById("signupForm").style.display = "none";
    document.getElementById("loginForm").style.display = "flex";
    document.getElementById("loginTitle").innerText =
      selectedRole === "admin" ? "Admin Login" : "Student Login";

  } catch(err) { alert("❌ " + err.message); }
}

// Submit on Enter key
document.addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    if(document.getElementById("loginForm").style.display==="flex") handleLogin();
    if(document.getElementById("signupForm").style.display==="flex") handleSignup();
  }
});
</script>
</body>
</html>
